<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>ভাগের চাকায় সালামী নির্ধারণ</title>
<style>
    body {
        text-align: center;
        font-family: Arial;
        background: #f5f5f5;
    }
    h1 {
        color: green;
    }
    .wheel {
        margin: 30px auto;
        width: 200px;
        height: 200px;
        border: 5px solid #333;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: conic-gradient(
            red 0% 16%,
            orange 16% 32%,
            yellow 32% 48%,
            green 48% 64%,
            blue 64% 80%,
            purple 80% 100%
        );
    }
    button {
        padding: 10px 20px;
        font-size: 18px;
        cursor: pointer;
    }
    #result {
        margin-top: 20px;
        font-size: 22px;
        color: red;
    }
    img {
        margin-top: 20px;
        width: 250px;
        display: none;
    }
</style>
</head>

<body>

<h1>ভাগের চাকায় সালামী নির্ধারণ</h1>

<div class="wheel">🎡</div>

<button onclick="spin()">Spin</button>

<div id="result"></div>

<img id="duaImage" src="your-image.jpg" alt="Dua Image">

<script>
function spin() {
    const wheel = document.querySelector(".wheel");
    const result = document.getElementById("result");
    const image = document.getElementById("duaImage");

    // Reset
    result.innerHTML = "";
    image.style.display = "none";

    // Random spin animation
    let rotate = 3600 + Math.floor(Math.random() * 1000);

    wheel.style.transition = "transform 3s ease-out";
    wheel.style.transform = "rotate(" + rotate + "deg)";

    // After spinning ends
    setTimeout(() => {
        result.innerHTML = "আপনি পেয়েছেন: 🤲 Dua";
        image.style.display = "block";
    }, 3000);
}
</script>

</body>
</html>
